name: Build B24 Browser APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: npm install

      - name: Install Expo CLI
        run: npm install -g @expo/cli

      - name: Prebuild
        run: npx expo prebuild --platform android --clean

      - name: Fix build.gradle
        run: |
          cat > /tmp/fix.js << 'JSEOF'
          const fs = require('fs');
          const lines = fs.readFileSync('android/app/build.gradle', 'utf8').split('\n');
          let result = [];
          let inBlock = false;
          let seenBrace = false;
          let depth = 0;
          for (const line of lines) {
            if (!inBlock && /^\s*signingConfigs/.test(line)) {
              inBlock = true; seenBrace = false; depth = 0;
            }
            if (inBlock) {
              for (const c of line) {
                if (c === '{') { depth++; seenBrace = true; }
                if (c === '}') depth--;
              }
              if (seenBrace && depth <= 0) inBlock = false;
              continue;
            }
            if (/^\s*signingConfig\s+/.test(line)) continue;
            result.push(line);
          }
          fs.writeFileSync('android/app/build.gradle', result.join('\n'));
          console.log('First 25 lines after fix:');
          console.log(result.slice(0,25).join('\n'));
          JSEOF
          node /tmp/fix.js

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build APK
        run: cd android && ./gradlew assembleDebug --no-daemon -x lint

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: B24Browser
          path: android/app/build/outputs/apk/debug/app-debug.apk
