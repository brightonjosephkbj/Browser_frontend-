name: Build B24 Browser APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: npm install

      - name: Install Expo CLI
        run: npm install -g @expo/cli

      - name: Prebuild
        run: npx expo prebuild --platform android --clean

      - name: Fix signing config
        run: |
          python3 - <<'PYEOF'
          import re
          with open('android/app/build.gradle', 'r') as f:
              content = f.read()
          # Remove signingConfigs block entirely
          content = re.sub(r'signingConfigs \{.*?\n\}', '', content, flags=re.DOTALL)
          # Remove signingConfig reference
          content = re.sub(r'\s*signingConfig signingConfigs\.release', '', content)
          with open('android/app/build.gradle', 'w') as f:
              f.write(content)
          print("Fixed build.gradle")
          PYEOF

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build APK
        run: cd android && ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: B24Browser
          path: android/app/build/outputs/apk/debug/app-debug.apk
