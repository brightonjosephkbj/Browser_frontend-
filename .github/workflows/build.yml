name: Build B24 Browser APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: npm install

      - name: Install Expo CLI
        run: npm install -g @expo/cli

      - name: Prebuild
        run: npx expo prebuild --platform android --clean

      - name: Remove signing config from build.gradle
        run: |
          python3 - <<'PYEOF'
          import re
          
          gradle_file = 'android/app/build.gradle'
          
          with open(gradle_file, 'r') as f:
              content = f.read()
          
          # Remove the entire signingConfigs block
          content = re.sub(
              r'\s*signingConfigs\s*\{[^}]*\}',
              '',
              content,
              flags=re.DOTALL
          )
          
          # Remove any signingConfig references in buildTypes
          content = re.sub(
              r'\s*signingConfig\s+signingConfigs\.\w+\s*',
              '',
              content
          )
          
          with open(gradle_file, 'w') as f:
              f.write(content)
          
          print("Successfully removed signing config from build.gradle")
          PYEOF

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build APK
        run: cd android && ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: B24Browser
          path: android/app/build/outputs/apk/debug/app-debug.apk
